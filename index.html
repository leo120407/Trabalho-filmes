<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBusca | Encontre seus filmes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="navbar">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 3v18M17 3v18M3 8h4M3 16h4M17 8h4M17 16h4" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span>Cine<strong>Busca</strong></span>
        </div>
        <span class="badge">TMDB API</span>
    </header>

    <section class="hero">
        <p class="kicker">Catálogo inteligente de filmes</p>
        <h1>Encontre o filme <span>perfeito</span> para hoje</h1>
        <p class="subtitle">Pesquise por título, escolha o idioma e descubra avaliações e sinopses na hora.</p>

        <form id="search-form">
            <div class="field">
                <label for="movie">Nome do filme</label>
                <input type="text" name="movie" id="movie" placeholder="Ex: Interestelar" autocomplete="off">
            </div>
            <div class="field field-lang">
                <label for="language">Idioma</label>
                <select name="language" id="language">
                    <option value="pt-br">Português</option>
                    <option value="en-US">Inglês</option>
                </select>
            </div>
            <button type="submit">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Procurar
            </button>
        </form>
    </section>

    <main>
        <div id="status" class="status"></div>
        <div id="movies-container" class="movies-container"></div>
    </main>

    <footer>
        <p>Desenvolvido com dados do <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a></p>
    </footer>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <button id="modal-close" class="modal-close" aria-label="Fechar">&times;</button>
            <div id="modal-content" class="modal-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
