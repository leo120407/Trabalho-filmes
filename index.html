<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine Busca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="bg-dark text-light p-3">
        <div>
            Cine Busca
        </div>
    </header>
    <form id="search-form" class="form-control">
        <label for="movie">Filme desejado</label>
        <input type="text" name="movie" id="movie">
        <label for="language">Linguagem do filme: </label>
        <select name="language" id="language">
            <option value="pt-br">Português</option>
            <option value="en-US">Inglês</option>
        </select>
        <button type="submit" class="btn-primary">Procurar</button>
    </form>
    <div id="movies-container">
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
